events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Limit file upload size (e.g. max 50 MB)
    client_max_body_size 50M;

    upstream flask_app {
        # 'web' is the service name defined in docker-compose.yml
        server web:5000;
    }

    server {
        listen 80;
        
        # You can change this to your server's domain or IP later (e.g., arsiv.ktu.edu.tr)
        server_name localhost;

        location / {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Optional: serve static files directly through Nginx for better performance
        # location /static/ {
        #     alias /app/static/;
        # }
    }
}
